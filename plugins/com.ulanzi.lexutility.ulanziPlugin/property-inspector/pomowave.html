<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pomowave</title>
    <style>
      :root { color-scheme: dark; --bg: #0f172a; --panel: #111c30; --text: #e2e8f0; --muted: #94a3b8; --line: #23314f; --accent: #ff8a65; }
      * { box-sizing: border-box; }
      body { margin: 0; padding: 16px; background: linear-gradient(180deg, #140d12 0%, #111827 100%); color: var(--text); font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .uspi-wrapper.hidden { display: none; }
      .panel { background: rgba(17, 28, 48, 0.92); border: 1px solid var(--line); border-radius: 14px; padding: 14px; }
      h1 { margin: 0 0 6px; font-size: 16px; }
      p { margin: 0 0 14px; color: var(--muted); }
      .field { display: grid; gap: 6px; margin-bottom: 12px; }
      label { color: var(--muted); }
      input { width: 100%; border: 1px solid var(--line); border-radius: 10px; background: #0b1220; color: var(--text); padding: 10px 12px; }
      input[type="hidden"] { display: none; }
      input[type="checkbox"] { width: 18px; height: 18px; margin: 0; accent-color: var(--accent); }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .theme-row, .seg-row { display: flex; gap: 8px; flex-wrap: wrap; }
      .theme-chip { width: 44px; height: 44px; border-radius: 10px; border: 1px solid var(--line); background: #0b1220; padding: 0; cursor: pointer; position: relative; overflow: hidden; }
      .theme-chip.active, .seg-btn.active { outline: 2px solid var(--accent); outline-offset: 2px; }
      .theme-chip span { display: block; width: 100%; height: 100%; }
      .seg-btn { min-width: 72px; border: 1px solid var(--line); border-radius: 10px; padding: 9px 10px; background: #0b1220; color: var(--text); cursor: pointer; font-size: 12px; font-weight: 700; }
      .toggle-row { display: grid; gap: 8px; }
      .toggle { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; background: #0b1220; }
      .toggle strong { display: block; font-size: 12px; }
      .toggle span { color: var(--muted); font-size: 12px; }
      .action-row { display: flex; gap: 10px; margin-top: 10px; }
      .action-row button { flex: 1; }
      button[type="submit"], .ghost-btn {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 700;
        cursor: pointer;
      }
      button[type="submit"] { background: var(--accent); color: #3d1306; }
      .ghost-btn { background: rgba(255, 138, 101, 0.12); color: #ffd9cb; border: 1px solid rgba(255, 138, 101, 0.28); }
      .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
      .uspi-feedback { margin-top: 10px; text-align: center; color: var(--accent); font-size: 12px; font-weight: 700; }
      .uspi-feedback[hidden] { display: none; }
      .frame-row { display: flex; gap: 10px; align-items: center; }
      .frame-toggle { display: flex; gap: 6px; align-items: center; color: var(--muted); white-space: nowrap; cursor: pointer; }
      .frame-toggle input { width: auto; }
    </style>
  </head>
  <body>
    <div class="uspi-wrapper hidden">
      <div class="panel">
        <h1>Pomowave</h1>
        <p>把番茄钟放进 Lex Utility。单击开始/暂停，双击重启当前专注（被打断时用），完成阶段时播放提示音。</p>
        <form id="property-inspector">
          <div class="grid">
            <div class="field">
              <label for="focusMin">Focus (min)</label>
              <input id="focusMin" name="focusMin" type="number" min="1" max="180" value="25">
            </div>
            <div class="field">
              <label for="shortBreakMin">Short break</label>
              <input id="shortBreakMin" name="shortBreakMin" type="number" min="1" max="60" value="5">
            </div>
          </div>
          <div class="grid">
            <div class="field">
              <label for="longBreakMin">Long break</label>
              <input id="longBreakMin" name="longBreakMin" type="number" min="1" max="120" value="15">
            </div>
            <div class="field">
              <label for="roundsBeforeLongBreak">Rounds</label>
              <input id="roundsBeforeLongBreak" name="roundsBeforeLongBreak" type="number" min="2" max="8" value="4">
            </div>
          </div>
          <div class="grid">
            <div class="field">
              <label for="theme">Theme</label>
              <input id="theme" name="theme" type="hidden" value="ember">
              <div class="theme-row" role="group" aria-label="Theme">
              </div>
            </div>
          </div>
          <div class="field">
            <label for="soundStyle">Sound</label>
            <input id="soundStyle" name="soundStyle" type="hidden" value="glass">
            <div class="seg-row" role="group" aria-label="Sound">
              <button class="seg-btn" type="button" data-sound-style="glass">Glass</button>
              <button class="seg-btn" type="button" data-sound-style="hero">Hero</button>
              <button class="seg-btn" type="button" data-sound-style="purr">Purr</button>
              <button class="seg-btn" type="button" data-sound-style="submarine">Sub</button>
            </div>
            <div class="hint">点按即可试听该提示音。</div>
          </div>
          <div class="toggle-row">
            <label class="toggle" for="soundEnabled">
              <div>
                <strong>Sound cue</strong>
                <span>阶段切换时播放提示音</span>
              </div>
              <input id="soundEnabled" name="soundEnabled" type="checkbox" checked>
            </label>
            <label class="toggle" for="repeatManualCue">
              <div>
                <strong>Continuous cue</strong>
                <span>手动进入下一阶段时循环播放，按键开始后停止</span>
              </div>
              <input id="repeatManualCue" name="repeatManualCue" type="checkbox">
            </label>
            <label class="toggle" for="autoStartBreaks">
              <div>
                <strong>Auto break</strong>
                <span>专注结束后自动进入休息</span>
              </div>
              <input id="autoStartBreaks" name="autoStartBreaks" type="checkbox" checked>
            </label>
            <label class="toggle" for="autoStartFocus">
              <div>
                <strong>Auto focus</strong>
                <span>休息结束后自动开始下一轮</span>
              </div>
              <input id="autoStartFocus" name="autoStartFocus" type="checkbox" checked>
            </label>
          </div>
          <div class="field">
            <label for="frameSize" data-localize="Safe frame">Safe frame</label>
            <div class="frame-row">
              <label class="frame-toggle"><input id="frameSize" name="frameSize" type="checkbox" data-on="optimal" data-off="max" checked><span data-localize="Optimal area">Optimal area</span></label>
              <label class="frame-toggle"><input id="showFrame" name="showFrame" type="checkbox" checked><span data-localize="Show frame">Show frame</span></label>
            </div>
          </div>
          <div class="action-row">
            <button class="ghost-btn" id="skipPhase" type="button" data-localize="Skip phase">Skip phase</button>
            <button class="ghost-btn" id="resetTimer" type="button" data-localize="Reset timer">Reset timer</button>
          </div>
          <div class="action-row">
            <button class="ghost-btn" id="resetDefaults" type="button" data-localize="Restore defaults">Restore defaults</button>
          </div>
          <div class="action-row">
            <button type="submit" data-localize="Save">Save</button>
          </div>
          <div class="uspi-feedback" id="inspector-feedback" hidden>
            <span id="feedback-saved" data-localize="Saved" hidden>Saved</span>
            <span id="feedback-reset" data-localize="Defaults restored" hidden>Defaults restored</span>
          </div>
        </form>
      </div>
    </div>
    <script src="../libs/js/constants.js"></script>
    <script src="../libs/js/eventEmitter.js"></script>
    <script src="../libs/js/utils.js"></script>
    <script src="../libs/js/ulanzideckApi.js"></script>
    <script src="./inspector-shared.js"></script>
    <script src="./pomowave.js"></script>
  </body>
</html>
