<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Network Speed</title>
    <style>
      :root { color-scheme: dark; --bg:#07101d; --panel:#111c30; --text:#e2e8f0; --muted:#94a3b8; --line:#23314f; --accent:#60a5fa; }
      * { box-sizing:border-box; } body { margin:0; padding:14px; background:linear-gradient(180deg,#07101d,#111827); color:var(--text); font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .hidden,[hidden] { display:none!important; } .panel { background:rgba(17,28,48,.94); border:1px solid var(--line); border-radius:14px; padding:14px; }
      h1 { margin:0 0 4px; font-size:17px; } h2 { margin:18px 0 10px; font-size:12px; color:#bfdbfe; text-transform:uppercase; letter-spacing:1.4px; }
      p,.hint,.status { color:var(--muted); } p { margin:0 0 12px; } .field { display:grid; gap:6px; margin-bottom:11px; } label { color:var(--muted); }
      input,select { width:100%; border:1px solid var(--line); border-radius:9px; background:#0b1220; color:var(--text); padding:9px 10px; }
      input[type=checkbox] { width:auto; } input[type=hidden] { display:none; } .grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
      .check { display:flex; gap:8px; align-items:center; padding:7px 0; } button { border:1px solid var(--line); border-radius:9px; padding:9px 10px; background:#101b30; color:var(--text); font-weight:700; cursor:pointer; }
      button.primary { background:var(--accent); color:#082f49; border:0; } .actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
      .runtime { padding:10px; border-radius:10px; background:#0b1220; border:1px solid var(--line); margin-bottom:10px; } .runtime strong { color:#bfdbfe; }
      .server-list { max-height:150px; overflow:auto; display:grid; gap:6px; } .server { padding:8px; border:1px solid var(--line); border-radius:8px; color:var(--muted); }
      .server b { color:var(--text); } .danger { color:#fca5a5; } .uspi-feedback { text-align:center; color:var(--accent); margin-top:9px; }
    </style>
  </head>
  <body>
    <div class="uspi-wrapper hidden"><div class="panel">
      <h1>Network Speed</h1><p>一个 action 可放置多个实例；每个实例独立选择中国大陆或海外节点。</p>
      <form id="property-inspector">
        <div id="runtime" class="runtime">等待插件状态…</div><div id="recentDetails" class="server-list"></div>
        <h2>概览与计划</h2>
        <div class="grid"><div class="field"><label for="scope">节点区域</label><select id="scope" name="scope"><option value="mainland">中国大陆</option><option value="overseas">海外（含港澳台）</option></select></div><div class="field"><label for="intervalMin">自动测速</label><select id="intervalMin" name="intervalMin"><option value="15">每 15 分钟</option><option value="30">每 30 分钟</option><option value="60">每 60 分钟</option><option value="manual">仅手动</option></select></div></div>
        <label class="check"><input id="activeAllDay" name="activeAllDay" type="checkbox">全天活跃</label>
        <div class="grid"><div class="field"><label for="activeStart">开始</label><input id="activeStart" name="activeStart" type="time" value="08:00"></div><div class="field"><label for="activeEnd">结束</label><input id="activeEnd" name="activeEnd" type="time" value="23:00"></div></div>
        <div class="field"><label for="timeoutSec">单次超时</label><select id="timeoutSec" name="timeoutSec"><option value="120">120 秒</option><option value="180">180 秒</option><option value="240">240 秒</option><option value="300">300 秒</option></select></div>
        <h2>节点选择</h2>
        <div class="field"><label for="selectionMode">模式</label><select id="selectionMode" name="selectionMode"><option value="dailyRandom">候选池每日随机</option><option value="fixed">固定节点</option></select></div>
        <div class="field"><label for="serverSearch">筛选自动获取的节点</label><input id="serverSearch" type="search" placeholder="城市、运营商、IP、Server ID"></div>
        <div id="serverList" class="server-list"><div class="server">尚未发现节点</div></div>
        <input id="candidateServers" name="candidateServers" type="hidden" value="[]">
        <div class="grid"><div class="field"><label for="fixedServerId">固定 Server ID</label><input id="fixedServerId" name="fixedServerId" inputmode="numeric" maxlength="12"></div><div class="field"><label for="manualServerId">手动验证 ID</label><input id="manualServerId" inputmode="numeric" maxlength="12"></div></div>
        <div class="actions"><button id="refreshServers" type="button">重新获取节点</button><button id="verifyServer" type="button">验证手动 ID</button></div>
        <h2>图表与外观</h2>
        <div class="grid"><div class="field"><label for="chartType">最近 24 次</label><select id="chartType" name="chartType"><option value="line">折线图</option><option value="bar">柱状图</option></select></div><div class="field"><label for="theme">主题</label><select id="theme" name="theme"><option value="signal">Signal</option><option value="mint">Mint</option><option value="ember">Ember</option><option value="mono">Mono</option><option value="sand">Sand</option></select></div></div>
        <label class="check"><input id="geoIpEnabled" name="geoIpEnabled" type="checkbox" checked>使用 IPWhois 校验节点 IP 位置（服务方可见请求公网 IP）</label>
        <div class="grid"><label class="check"><input id="frameSize" name="frameSize" type="checkbox" data-on="optimal" data-off="max" checked>适当放大</label><label class="check"><input id="showFrame" name="showFrame" type="checkbox" checked>显示边框</label></div>
        <h2>诊断</h2>
        <div class="field"><label for="cliPath">Ookla CLI 路径（可留空自动查找）</label><input id="cliPath" name="cliPath" placeholder="/opt/homebrew/bin/speedtest"><div class="hint">插件不会下载 CLI，也不会代为接受 Ookla 条款。</div></div>
        <div class="actions"><button id="testSelected" class="primary" type="button">立即测速</button><button id="clearHistory" class="danger" type="button">清除历史</button><button id="resetDefaults" type="button">恢复默认</button><button class="primary" type="submit">保存</button></div>
        <div class="uspi-feedback" id="inspector-feedback" hidden><span id="feedback-saved" hidden>已保存</span><span id="feedback-reset" hidden>已恢复默认</span></div>
      </form>
    </div></div>
    <script src="../libs/js/constants.js"></script><script src="../libs/js/eventEmitter.js"></script><script src="../libs/js/utils.js"></script><script src="../libs/js/ulanzideckApi.js"></script><script src="./inspector-shared.js"></script><script src="./speedtest.js"></script>
  </body>
</html>
