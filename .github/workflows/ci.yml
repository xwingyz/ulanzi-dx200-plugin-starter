name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      # The test suite imports the plugin's runtime modules (ws, mqtt, …),
      # so the plugin's dependencies must be installed before running tests.
      - name: Install plugin dependencies
        working-directory: plugins/com.ulanzi.lexutility.ulanziPlugin
        run: npm ci --registry https://registry.npmjs.org
      - name: Run tests
        run: npm test
