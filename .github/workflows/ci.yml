name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # The test suite relies on node:test async semantics from current
        # Node; older lines (20/22) report pending-promise failures. Track
        # the version the project actually targets.
        node-version: [24]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      # The test suite imports runtime modules (ws, mqtt, …) from both the
      # business plugin and the template, so their dependencies must be
      # installed before running tests. The plugin has a lockfile (npm ci);
      # the template has none (npm install).
      - name: Install plugin dependencies
        working-directory: plugins/com.ulanzi.lexutility.ulanziPlugin
        run: npm ci --registry https://registry.npmjs.org
      - name: Install template dependencies
        working-directory: template/com.example.hello.ulanziPlugin
        run: npm install --registry https://registry.npmjs.org
      - name: Run tests
        run: npm test
